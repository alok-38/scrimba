<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>setTimeout</title>
</head>

<body>
    <script>
        console.log('What is the capital of Peru?')
        console.log('Lima!')

        /*
        Challenge:
        1. Make the third console.log fire 3 seconds after 
           the answer appears.
        */
        setTimeout(() => {
            console.log('Ready for next question?')
        }, 3000);

        function logAnswer() {
            console.log(`The answer is 'Lima' of course! If you got that right, giver yourself 10 points.`)
        }

        console.log('What is the capital of Peru?')
        /*
        Challenge:
            1. After a 3 second delay, call the 'logAnswer' function.
            2. Make sure 'logAnswer' has all the info it needs. 
               The answer is 'Lima' and it's 10 points for getting it right. 
        */
        setTimeout(() => {
            logAnswer();
        }, 3000);
    </script>
</body>

</html>
