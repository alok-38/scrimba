<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object Destructuring</title>
</head>

<body>
    <script>
        const favouriteFilm = {
            title: "Top Gun",
            year: "1986",
            genre: "action",
            star: "Tom Cruise",
            director: "Tony Scott"
        };
        const { title, year, genre, star, director } = favouriteFilm;
        const favouriteFilmObjects = { title, year, genre, star, director };
        console.log(favouriteFilmObjects);

        // Challenge
        const dreamHoliday = {
            destination: 'Texas',
            activity: 'Talk to Elon',
            accommodation: 'Factory floor',
            companion: 'Mr Musk'
        }

        /*
        Challenge
        1. Complete the object dreamHoliday with whatever
           information is true for you. Feel free to add 
           extra properties or change the existing ones. 
        2. Destructure the object and use the individual 
           variables to log out one or more sentences about 
           your dream holiday. 
           
        E.g. "I would love to go to Austin, Texas to visit the Tesla HQ. 
             I'd sleep in a luxury ranch and hang out with Elon Musk all day."
        */

        const { destination, activity, accommodation, companion } = dreamHoliday;
        console.log(`I would love to go to ${destination}, to visit the Tesla HQ,
        I'd sleep in a luxury ${accommodation} and hang out with ${companion} all day!`);

    </script>
</body>

</html>
