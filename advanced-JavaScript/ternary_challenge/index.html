<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ternary Operator Challenge</title>
</head>

<body>
    <script>
        const playerGuess = 3;
        const correctAnswer = 6;

        /*
        Challenge 
        1. Refactor the if else statement to use a ternary operator.
        */

        let message = ''
        if (playerGuess === correctAnswer) {
            message = 'Correct!';
        }
        else {
            message = 'Wrong!';
        }

        console.log(message);

        // Refactored code
        const rightOrWrong = playerGuess === correctAnswer ? "Correct!" : "Wrong!";
        console.log(rightOrWrong);

        /*
Challenge
1. Now improve the functionality of this code by 
   letting the player know if their guess was too high, 
   too low, or exactly right.
*/
        const rightOrWrongImproved = playerGuess === correctAnswer
            ? "Correct!"
            : playerGuess > correctAnswer
                ? "Too high"
                : "Too low";

        console.log(rightOrWrongImproved);
    </script>
</body>

</html>
