<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Updating UI with Javascript</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="text/javascript">
      const divEl = document.getElementById('app');
      const h1El = document.createElement('h1');
      //   text node for the h1
      const text = 'Updating UI with Javascript';
      const h1Text = document.createTextNode(text);
      //   Append the text to the h1 element
      h1El.appendChild(h1Text);
      //   Place the h1 element inside the div
      divEl.appendChild(h1El);
    </script>
  </body>
</html>
