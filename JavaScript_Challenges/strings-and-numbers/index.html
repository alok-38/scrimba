<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strings and numbers</title>
  </head>
  <body>
    <script>
      // Try to predict what each of the lines will log out
      console.log('2' + 2); // 22
      console.log(11 + 7); // 18
      console.log(6 + '5'); // 65
      console.log('My points: ' + 5 + 9); // My points: 14
      console.log(2 + 2); // 4
      console.log('11' + '14'); // 1114
    </script>
  </body>
</html>
