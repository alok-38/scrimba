<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basketball-Scoreboard</title>
    <link rel="icon" href="https://fav.farm/👓" />
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <main>
      <section>
        <h1>HOME</h1>
        <div class="home-display">0</div>
        <div class="counter">
          <button id="home_btn_1">+1</button>
          <button id="home_btn_2">+2</button>
          <button id="home_btn_3">+3</button>
        </div>
      </section>
      <div class="period-reset">
        <section>
          <h2>PERIOD</h2>
          <div class="period-display">1</div>
          <div class="period-controls">
            <button id="period_up">Next</button>
            <button id="period_down">Prev</button>
          </div>
        </section>
        <section>
          <button id="reset">NEW GAME</button>
        </section>
      </div>
      <section>
        <h1>GUEST</h1>
        <div class="guest-display">0</div>
        <div class="counter">
          <button id="guest_btn_1">+1</button>
          <button id="guest_btn_2">+2</button>
          <button id="guest_btn_3">+3</button>
        </div>
      </section>
    </main>
  </body>
</html>
