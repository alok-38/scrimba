<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Destructuring</title>
  </head>
  <body>
    <script>
      let a, b, rest;
      [a, b] = [10, 20];
      console.log(a);
      console.log(b);
      [a, b, ...rest] = [10, 20, 30, 40, 50];
      console.log(rest);
      function logall(...params) {
        console.log(params);
      }
      logall(1, 2, 3);
      //   Object destructuring
      const { alok, ...remaining } = { a: 1, b: 2, c: 3 };
      console.log(remaining);
      //   Array destructuring
      const numbers = ["one", "two", "three"];
      const [red, yellow, green] = numbers;
      console.log(red, yellow, green);
      //   Swapping
      alok = 1;
      let anand = 3;
      [alok, anand] = [anand, alok];
      console(alok, anand);
    </script>
  </body>
</html>
