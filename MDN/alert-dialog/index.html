<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alert Dialog</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="grid place-content-center min-h-screen">
      <h1 class="text-red-500 text-3xl">Danger Zone</h1>
      <div>
        <div class="border-2 border-red-500 rounded-md p-6 mt-6">
          <p class="mb-4">
            Once you delete, there is no going back. Please be certain.
          </p>
          <button
            class="border bg-red-400 hover:bg-red-500 hover:shadow-lg transform active:scale-95 text-white rounded-md cursor-pointer px-6 py-2 transition"
          >
            Delete
          </button>
        </div>
      </div>
      <div class="modal w-100" id="modal-el">
        <div class="mt-6">
          <div>
            <h2 class="mb-2">Are you absolutely sure?</h2>
            <p>
              This action cannot be undone. This will permanently delete your
              account from our servers.
            </p>
          </div>
          <div class="flex gap-4">
            <button class="cursor-pointer">Cancel</button>
            <button class="cursor-pointer">Continue</button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
