<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI study plan</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>

<body>
    <main>
        <h1>Study Plan Generator</h1>
        <form action="#">
            <input autofocus type="text" id="subjects" placeholder="Enter subjects">
            <input autofocus type="number" id="days" placeholder="Days available">
            <input autofocus type="number" id="hours" placeholder="Hours per day">
            <button>Generate Plan</button>
        </form>
        <div id="output"></div>
    </main>
</body>

</html>
