<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title (important for SEO) -->
    <title>Basketball Scorecard | Live Score Tracker</title>

    <!-- Meta Description -->
    <meta
      name="description"
      content="A simple basketball scorecard app to track live scores for home and guest teams. Built as a Scrimba solo project using JavaScript."
    />

    <!-- Keywords (less important nowadays, but okay for learning) -->
    <meta
      name="keywords"
      content="basketball scorecard, scoreboard app, scrimba project, javascript score tracker"
    />

    <!-- Author -->
    <meta name="author" content="Your Name" />

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- Open Graph (for sharing on social media) -->
    <meta property="og:title" content="Basketball Scorecard" />
    <meta
      property="og:description"
      content="Track basketball scores in real-time with this simple web app."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://your-site-url.com" />
    <meta property="og:image" content="https://your-site-url.com/preview.png" />

    <!-- Font preload -->
    <link
      rel="preload"
      href="./CursedTimerUlil-Aznm.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="scoreboard">
      <!-- HOME TEAM -->
      <section
        class="scoreboard__team scoreboard__team--home"
        aria-labelledby="home-title"
      >
        <h2 id="home-title" class="scoreboard__title">Home</h2>

        <div
          id="home-score"
          class="scoreboard__score"
          aria-live="polite"
          aria-atomic="true"
        >
          0
        </div>

        <div
          class="scoreboard__controls"
          role="group"
          aria-label="Home score controls"
        >
          <button
            class="scoreboard__button"
            aria-label="Add 1 point to home score"
          >
            +1
          </button>

          <button
            class="scoreboard__button"
            aria-label="Add 2 points to home score"
          >
            +2
          </button>

          <button
            class="scoreboard__button"
            aria-label="Add 3 points to home score"
          >
            +3
          </button>
        </div>
      </section>

      <!-- GUEST TEAM -->
      <section
        class="scoreboard__team scoreboard__team--guest"
        aria-labelledby="guest-title"
      >
        <h2 id="guest-title" class="scoreboard__title">Guest</h2>

        <div
          id="guest-score"
          class="scoreboard__score"
          aria-live="polite"
          aria-atomic="true"
        >
          0
        </div>

        <div
          class="scoreboard__controls"
          role="group"
          aria-label="Guest score controls"
        >
          <button
            class="scoreboard__button"
            aria-label="Add 1 point to guest score"
          >
            +1
          </button>

          <button
            class="scoreboard__button"
            aria-label="Add 2 points to guest score"
          >
            +2
          </button>

          <button
            class="scoreboard__button"
            aria-label="Add 3 points to guest score"
          >
            +3
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
