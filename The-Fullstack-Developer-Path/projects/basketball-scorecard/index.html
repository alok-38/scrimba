<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>Basketball Scorecard | Live Score Tracker</title>

    <meta
      name="description"
      content="A simple basketball scorecard app to track live scores for home and guest teams. Built as a Scrimba solo project using JavaScript."
    />

    <meta
      name="keywords"
      content="basketball scorecard, scoreboard app, scrimba project, javascript score tracker"
    />

    <meta name="author" content="Your Name" />

    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <meta property="og:title" content="Basketball Scorecard" />
    <meta
      property="og:description"
      content="Track basketball scores in real-time with this simple web app."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://your-site-url.com" />
    <meta property="og:image" content="https://your-site-url.com/preview.png" />

    <link
      rel="preload"
      href="./CursedTimerUlil-Aznm.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />

    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>

  <body>
    <div class="wrapper">
      <header class="scoreboard__header">
        <h1 class="scoreboard__highlight" id="scoreboard-leader"></h1>
        <div
          class="scoreboard__score scoreboard__score--leader"
          aria-live="polite"
          aria-atomic="true"
        >
          <span id="leader-score" class="scoreboard__score-value">0</span>
        </div>
      </header>
      <main id="scoreboard" class="scoreboard">
        <div class="scoreboard__teams">
          <!-- HOME TEAM -->
          <section
            id="home-team"
            class="scoreboard__team scoreboard__team--home"
            aria-labelledby="home-title"
          >
            <h2 id="home-title" class="scoreboard__team-title">Home</h2>
            <div
              class="scoreboard__score"
              aria-live="polite"
              aria-atomic="true"
            >
              <span id="home-score" class="scoreboard__score-value">0</span>
            </div>
            <div
              id="home-controls"
              class="scoreboard__controls"
              role="group"
              aria-label="Home score controls"
            >
              <button
                id="home-add-1"
                class="scoreboard__button"
                data-team="home"
                data-points="1"
                aria-label="Add 1 point to home score"
              >
                +1
              </button>
              <button
                id="home-add-2"
                class="scoreboard__button"
                data-team="home"
                data-points="2"
                aria-label="Add 2 points to home score"
              >
                +2
              </button>
              <button
                id="home-add-3"
                class="scoreboard__button"
                data-team="home"
                data-points="3"
                aria-label="Add 3 points to home score"
              >
                +3
              </button>
            </div>
          </section>
          <!-- GUEST TEAM -->
          <section
            id="guest-team"
            class="scoreboard__team scoreboard__team--guest"
            aria-labelledby="guest-title"
          >
            <h2 id="guest-title" class="scoreboard__team-title">Guest</h2>
            <div
              class="scoreboard__score"
              aria-live="polite"
              aria-atomic="true"
            >
              <span id="guest-score" class="scoreboard__score-value">0</span>
            </div>
            <div
              id="guest-controls"
              class="scoreboard__controls"
              role="group"
              aria-label="Guest score controls"
            >
              <button
                id="guest-add-1"
                class="scoreboard__button"
                data-team="guest"
                data-points="1"
                aria-label="Add 1 point to guest score"
              >
                +1
              </button>
              <button
                id="guest-add-2"
                class="scoreboard__button"
                data-team="guest"
                data-points="2"
                aria-label="Add 2 points to guest score"
              >
                +2
              </button>
              <button
                id="guest-add-3"
                class="scoreboard__button"
                data-team="guest"
                data-points="3"
                aria-label="Add 3 points to guest score"
              >
                +3
              </button>
            </div>
          </section>
          <!-- NEW GAME -->
          <section id="game-controls" class="scoreboard__game-controls">
            <button
              id="new-game"
              class="scoreboard__button scoreboard__button--reset"
              aria-label="Start a new game and reset scores"
            >
              New Game
            </button>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
