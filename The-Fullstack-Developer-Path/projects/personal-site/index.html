<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Primary SEO -->
    <title>Alok | Personal Webpage</title>
    <meta
      name="description"
      content="Welcome to Alok's personal website. Explore projects, skills, portfolio, and contact information."
    />
    <meta name="author" content="Alok" />

    <!-- Open Graph -->
    <meta property="og:title" content="Alok | Personal Website" />
    <meta
      property="og:description"
      content="Explore Alok's portfolio, projects, and skills."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:image" content="https://yourdomain.com/preview.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Canonical -->
    <link rel="canonical" href="https://yourdomain.com" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=Black+Ops+One&family=Creepster&family=La+Belle+Aurore&family=MedievalSharp&family=Orbitron&family=Rye&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />

    <!-- JS -->
    <script src="index.js" defer></script>
  </head>

  <body>
    <a href="#main-content" class="skip-link">Skip to content</a>

    <div class="wrapper" role="document">
      <header role="banner">
        <figure aria-labelledby="profile-caption">
          <img
            src="images/alok.jpg"
            alt="Portrait of Alok smiling"
            loading="lazy"
          />
          <figcaption id="profile-caption">Profile picture of Alok</figcaption>
        </figure>

        <h1 id="page-title">Hi, my name is Alok</h1>
      </header>

      <main id="main-content" role="main" aria-labelledby="page-title">
        <h2>Fun facts about me:</h2>

        <ul aria-label="Fun facts about Alok">
          <li>41 years old</li>
          <li>Lives in India</li>
          <li>Sings occasionally</li>
        </ul>

        <p>
          Please connect with me on
          <a
            href="https://www.linkedin.com/in/alokananda-y-1b06272a1/"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Visit Alok's LinkedIn profile (opens in new tab)"
          >
            LinkedIn
          </a>
        </p>
      </main>

      <footer role="contentinfo">
        <input
          type="email"
          placeholder="Enter your email"
          aria-label="Email address"
          required
          autocomplete="email"
        />
        <button type="button" aria-label="Subscribe to newsletter">
          Join newsletter
        </button>
      </footer>
    </div>
  </body>
</html>
