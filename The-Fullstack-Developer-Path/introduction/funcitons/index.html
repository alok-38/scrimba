<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Non Parameterized functions</title>
</head>
<body>
    <div id="functionData1"></div>
    <script>
        function add(a, b) {
            return a + b;
        }
        document.getElementById('functionData1').innerHTML = add(3, 4);
    </script>
</body>
</html>
