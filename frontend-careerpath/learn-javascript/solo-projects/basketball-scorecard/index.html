<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basketball Scorecard</title>
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="board">
      <div class="container">
        <section id="home">
          <h1>HOME</h1>
          <div class="display">
            <div class="LCD1">0</div>
          </div>
          <div class="button">
            <button data-value="1">
              <span style="padding-right: 5px">+</span>1
            </button>
            <button data-value="2">
              <span style="padding-right: 5px">+</span>2
            </button>
            <button data-value="3">
              <span style="padding-right: 5px">+</span>3
            </button>
          </div>
        </section>
        <section id="new-game">
          <h1>NEW GAME</h1>
          <div class="display">
            <div class="LCD2">0</div>
          </div>
          <div>
            <button class="new">New Game</button>
          </div>
        </section>
        <section id="guest">
          <h1>GUEST</h1>
          <div class="display">
            <div class="LCD3">0</div>
          </div>
          <div class="button">
            <button data-value="1">
              <span style="padding-right: 5px">+</span>1
            </button>
            <button data-value="2">
              <span style="padding-right: 5px">+</span>2
            </button>
            <button data-value="3">
              <span style="padding-right: 5px">+</span>3
            </button>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
