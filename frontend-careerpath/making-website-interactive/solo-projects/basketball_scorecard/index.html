<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Scorecard</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <main>
        <div class="section">
            <section>
                <h2>HOME</h2>
                <div class="display">

                </div>
                <div class="buttons">
                    <button><span class="fa fa-plus"></span>1</button>
                    <button><span class="fa fa-plus"></span>2</button>
                    <button><span class="fa fa-plus"></span>3</button>
                </div>
            </section>
            <section>
                <h2>PERIOD</h2>
                <div class="display">
                </div>
            </section>
            <section>
                <h2>FOULS</h2>
                <div class="display">
                </div>
            </section>
            <section>
                <h2>TIMER</h2>
                <div class="display">
                </div>
            </section>
            <section>
                <h2>GUEST</h2>
                <div class="display">
                </div>
                <div class="buttons">
                    <button><span class="fa fa-plus"></span>1</button>
                    <button><span class="fa fa-plus"></span>2</button>
                    <button><span class="fa fa-plus"></span>3</button>
                </div>
            </section>
        </div>
        <button class="new-game">New Game</button>
    </main>
</body>

</html>
