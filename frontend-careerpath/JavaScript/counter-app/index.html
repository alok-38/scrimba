<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <script src="script.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 flex flex-col justify-center items-center h-96">
    <main class="p-4 flex flex-col gap-y-5 bg-white w-96">
        <h1 class="text-center text-orange-600 text-5xl">Counter</h1>
        <span class="text-9xl mb-2"></span>
        <div class="flex flex-row justify-center gap-4 mb-5">
            <button id="decrement"
                class="bg-violet-500 hover:bg-violet-600 active:bg-violet-700 focus:outline-none focus:ring focus:ring-violet-300 text-white py-3 px-4 rounded-lg">Decrement</button><button id="reset"
                class="px-4 bg-red-500 hover:bg-red-600 active:bg-red-700 focus:outline-none focus:ring focus:ring-red-300 text-white rounded-lg">Reset</button><button id="increment"
                class="px-4 bg-green-500 hover:bg-green-600 active:bg-green-700 focus:outline-none focus:ring focus:ring-green-300 text-white rounded-lg">Increment</button>
        </div>
    </main>
</body>

</html>
