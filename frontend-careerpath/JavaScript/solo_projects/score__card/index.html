<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basketball Scorecard</title>
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <main role="main">
      <div class="container">
        <section>
          <h1>HOME</h1>
          <div class="board">
            <div class="home-display"></div>
          </div>
          <div class="buttons">
            <button class="home-one">+1</button
            ><button class="home-two">+2</button
            ><button class="home-three">+3</button>
          </div>
        </section>
        <section>
          <h1>RESET</h1>
          <div class="board">
            <div class="display"></div>
          </div>
          <div class="buttons">
            <button class="reset">RESET</button>
          </div>
        </section>
        <section>
          <h1>GUEST</h1>
          <div class="board">
            <div class="guest-display"></div>
          </div>
          <div class="buttons">
            <button class="guest-one">+1</button
            ><button class="guest-two">+2</button
            ><button class="guest-three">+3</button>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
