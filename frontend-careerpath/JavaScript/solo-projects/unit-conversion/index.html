<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metric/Imperial Unit Conversion</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <script src="app.js" defer></script>
</head>

<body>
    <main>
        <header>
            <h3>Metric/Imperial Unit Conversion</h3>
            <input type="text">
            <button>Convert</button>
        </header>
        <div>
            <p id="length">Length (Meter/Feet)</p>
            <p id="feet" style="color: #ffffff;"></p>
        </div>
        <div>
            <p id="volume">Volume (Liters/Gallons)</p>
            <p id="gallons" style="color: #ffffff;"></p>
        </div>
        <div>
            <p id="mass">Mass (Kilograms/Pounds)</p>
            <p id="pounds" style="color: #ffffff;"></p>
        </div>
    </main>
</body>

</html>
